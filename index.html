<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABHISHEK // AI DEVELOPER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --neon-red: #ff2d55;
        --neon-magenta: #ff00ff;
        --neon-cyan: #00ffff;
        --bg-dark: #0a0a0f;
        --bg-panel: #0d0d12;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg-dark);
        overflow-x: hidden;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg-dark); }
      ::-webkit-scrollbar-thumb { background: var(--neon-red); }
      /* Scanline animation */
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      /* Glitch effect */
      @keyframes glitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
      }
      /* Shimmer effect */
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      /* Pulse glow */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 5px var(--neon-red), 0 0 10px var(--neon-red); }
        50% { box-shadow: 0 0 15px var(--neon-red), 0 0 30px var(--neon-red); }
      }
      /* Grid pulse */
      @keyframes grid-pulse {
        0%, 100% { opacity: 0.03; }
        50% { opacity: 0.06; }
      }
      .scanline-anim { animation: scanline 8s linear infinite; }
      .grid-pulse { animation: grid-pulse 4s ease-in-out infinite; }
      .shimmer { animation: shimmer 2s infinite; }
      .pulse-glow { animation: pulse-glow 2s infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
